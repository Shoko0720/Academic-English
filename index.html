<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
  <title>Academic English Vocabulary</title>
  <meta name="description" content="アカデミック英語語彙の4択クイズ学習アプリ">
  <meta name="theme-color" content="#1e3a8a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AcadEng">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <h1 class="topbar__title">📚 Academic English</h1>
      <nav class="topbar__nav">
        <button class="nav-btn active" data-nav="home">ホーム</button>
        <button class="nav-btn" data-nav="stats">統計</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <section id="screen-home" class="screen"></section>
    <section id="screen-sheet" class="screen hidden"></section>
    <section id="screen-quiz" class="screen hidden"></section>
    <section id="screen-result" class="screen hidden"></section>
    <section id="screen-stats" class="screen hidden"></section>
  </main>

  <footer class="footer">
    <small>AcadEng_Vocabulary.xlsx · ローカル学習用 · <strong>v6 (2026-05-24)</strong></small>
  </footer>

  <script src="data/vocabulary.js"></script>
  <script src="data/word-details.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/srs.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => {
          console.warn('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
